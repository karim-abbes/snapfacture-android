name: Build tagged release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        if: ${{ hashFiles('gradlew') == '' }}
        run: gradle wrapper --gradle-version=8.10.2 --distribution-type=bin

      # The release keystore is stored as a base64 GitHub secret so every
      # release is signed with the SAME key — without that, Android refuses
      # updates and users would have to uninstall (losing their local data).
      # See docs/RELEASING.md for how to create and register the keystore.
      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret is missing — cannot sign a release. See docs/RELEASING.md."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Run unit tests
        shell: bash
        run: |
          set -eo pipefail
          ./gradlew testReleaseUnitTest --no-daemon --stacktrace

      - name: Build signed release APK
        shell: bash
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -eo pipefail
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -PversionName="$VERSION_NAME" \
            -PversionCode="${{ github.run_number }}"

      - name: Locate and rename APK
        run: |
          set -e
          mkdir -p artifact
          APK=$(find app/build/outputs/apk/release -name "*.apk" ! -name "*unsigned*" | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::No signed release APK found"
            exit 1
          fi
          cp "$APK" "artifact/snapfacture-${{ github.ref_name }}.apk"
          ls -lh artifact/

      - name: Publish frozen GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            APK release signé, figé au tag ${{ github.ref_name }}.
            Commit: ${{ github.sha }}

            Cette release ne sera plus modifiée — l'APK reste téléchargeable à vie via le lien stable ci-dessous.
          files: artifact/*.apk
          prerelease: false
          make_latest: true
