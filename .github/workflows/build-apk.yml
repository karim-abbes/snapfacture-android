name: Build APK

on:
  push:
    branches:
      - "claude/**"
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version=8.10.2 --distribution-type=bin

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifact
          cp app/build/outputs/apk/debug/app-debug.apk artifact/ohmybattery-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ohmybattery-debug-apk
          path: artifact/ohmybattery-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish to GitHub Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: Latest debug build
          body: |
            Build automatique du dernier commit sur ${{ github.ref_name }}.
            Commit: ${{ github.sha }}
          files: artifact/ohmybattery-debug.apk
          prerelease: true
          make_latest: false
